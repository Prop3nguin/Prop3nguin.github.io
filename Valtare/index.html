<!DOCTYPE html>
<html>
  <head>
      <title>Conlang Translator</title>
  </head>
  <body>

    <h1>Translator</h1>

    <input id="input" placeholder="Enter English text">
    <button onclick="translateText()">Translate</button>

    <p id="output"></p>

    <h2>Lexicon</h2>

    <button onclick="loadLexicon()">Load Lexicon</button>

    <ul id="lexicon"></ul>

    <script>
const API_URL = "https://flaskbackend-omjs.onrender.com";

// Translate
async function translateText() {
    const text = document.getElementById("input").value;

    try {
        const res = await fetch(API_URL + "/translate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text: text })
        });

        const data = await res.json();

        document.getElementById("output").innerText = data.result;

    } catch (err) {
        console.error(err);
        document.getElementById("output").innerText =
            "Error connecting to API";
    }
}

// Load lexicon
async function loadLexicon() {
    try {
        const res = await fetch(API_URL + "/lexicon");

        const data = await res.json();

        const list = document.getElementById("lexicon");

        list.innerHTML = "";

        for (const word in data) {
            const li = document.createElement("li");
            li.innerText = word + " → " + data[word];
            list.appendChild(li);
        }

    } catch (err) {
        console.error(err);
    }
}
    </script>

  </body>
</html>
